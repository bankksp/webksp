name = "webksp"
main = "worker/index.ts"
compatibility_date = "2024-09-23"

# โดเมน ksp.ac.th ให้เพิ่มใน Cloudflare Dashboard หลัง deploy สำเร็จ:
# Workers & Pages > webksp > Settings > Domains & Routes > Add > Custom domain
# ใส่ ksp.ac.th และ www.ksp.ac.th (redirect www ใน worker แล้ว)

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
html_handling = "auto-trailing-slash"

# Environment variables ใน Cloudflare Dashboard > webksp > Settings > Variables:
#   VITE_APP_URL=https://ksp.ac.th
#   VITE_GAS_WEB_APP_URL, VITE_GAS_SECRET, VITE_ADMIN_EMAIL (Build)
#   CANONICAL_URL=https://ksp.ac.th, GAS_WEB_APP_URL, GAS_SECRET (Runtime)
