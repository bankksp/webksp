name = "webksp"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# Environment variables สำหรับ production ตั้งใน Cloudflare Dashboard:
# Workers & Pages > webksp > Settings > Environment variables
#
# Build-time (สำหรับ Vite):
#   VITE_GAS_WEB_APP_URL
#   VITE_GAS_SECRET
#   VITE_ADMIN_EMAIL
#
# Runtime (สำหรับ Pages Functions):
#   GAS_WEB_APP_URL
#   GAS_SECRET
