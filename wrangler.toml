name = "webksp"
main = "worker/index.ts"
compatibility_date = "2024-09-23"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Environment variables ตั้งใน Cloudflare Dashboard:
# Workers & Pages > webksp > Settings > Variables and Secrets
#
# Build-time (Vite):
#   VITE_GAS_WEB_APP_URL
#   VITE_GAS_SECRET
#   VITE_ADMIN_EMAIL
#
# Runtime (Worker):
#   GAS_WEB_APP_URL
#   GAS_SECRET
